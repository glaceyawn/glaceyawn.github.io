<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tabby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f11;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 340px;
      background: linear-gradient(160deg, #1f1f1f 0%, #1a1a1a 100%);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #222;
      background: rgba(0,0,0,0.15);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(136,120,212,0.1);
    }

    .profile-right {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .username { font-size: 0.7rem; font-weight: 400; white-space: nowrap; }
    .u-bracket { color: #484848; }
    .u-name    { color: #a8b0cc; }
    .u-at      { color: #484848; }
    .u-host    { color: #8878d4; }
    .u-path    { color: #484848; }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2e2e2e;
      flex-shrink: 0;
      margin-left: 8px;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-dot.online { background: #3ba55d; box-shadow: 0 0 5px rgba(59,165,93,0.5); }
    .status-dot.idle   { background: #faa61a; box-shadow: 0 0 5px rgba(250,166,26,0.4); }
    .status-dot.dnd    { background: #ed4245; box-shadow: 0 0 5px rgba(237,66,69,0.4); }

    /* ── Section ── */
    .section {
      padding: 11px 16px;
      border-bottom: 1px solid #202020;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.58rem;
      color: #3a3a3a;
      text-transform: lowercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    /* ── About ── */
    .about-text {
      font-size: 0.66rem;
      font-weight: 300;
      color: #6e6e6e;
      line-height: 1.65;
      letter-spacing: 0.01em;
      padding-left: 2px;
    }

    /* ── Links ── */
    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      margin-top: 3px;
      border-radius: 2px;
      border-left: 2px solid transparent;
      text-decoration: none;
      color: #707070;
      font-size: 0.68rem;
      font-weight: 300;
      transition: all 0.12s ease;
      cursor: pointer;
    }
    .link-row:first-child { margin-top: 0; }

    .link-row:hover {
      background: rgba(136,120,212,0.07);
      border-left-color: #8878d4;
      color: #c0c0c0;
      padding-left: 10px;
    }

    .link-row:hover .link-arrow {
      opacity: 1;
      color: #8878d4;
    }

    .link-arrow {
      font-size: 0.65rem;
      opacity: 0;
      transition: opacity 0.12s, color 0.12s;
    }

    /* ── Footer ── */
    .footer {
      padding: 7px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.15);
    }

    .footer-left  { font-size: 0.58rem; color: #2e2e2e; letter-spacing: 0.04em; }
    .footer-right { font-size: 0.58rem; color: #8878d4; opacity: 0.35; letter-spacing: 0.04em; }
    /* ── Music player ── */
    .music-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
    }

    .music-note {
      font-size: 0.6rem;
      color: #8878d4;
      flex-shrink: 0;
    }

    .music-title {
      font-size: 0.64rem;
      font-weight: 300;
      color: #5a5a5a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-controls {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .music-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      width: 22px;
      height: 22px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.55rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.12s, color 0.12s;
      padding: 0;
      line-height: 1;
    }

    .music-btn:hover {
      border-color: #8878d4;
      color: #8878d4;
    }

    .vol-slider {
      flex: 1;
      height: 2px;
      -webkit-appearance: none;
      appearance: none;
      background: #2a2a2a;
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8878d4;
      cursor: pointer;
    }

    .vol-slider::-moz-range-thumb {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8878d4;
      cursor: pointer;
      border: none;
    }

    /* ── Enter overlay ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #enter-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 12, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      transition: opacity 0.5s ease;
    }

    #enter-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .enter-text {
      font-size: 0.75rem;
      font-weight: 300;
      color: #666;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      animation: pulse 2.4s ease-in-out infinite;
      user-select: none;
    }

    .enter-text .e-bracket { color: #333; }
    .enter-text .e-main    { color: #8878d4; }
    .enter-text .e-kaomoji { color: #555; }
  </style>
</head>
<body>

<!-- enter overlay -->
<div id="enter-overlay">
  <span class="enter-text">
    <span class="e-bracket">[</span><span class="e-main">click 2 entr! </span><span class="e-kaomoji">:3</span><span class="e-bracket">]</span>
  </span>
</div>

<div id="yt-player" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden;"></div>

<div class="card">

      <button class="music-btn" id="play-btn" title="play / pause">▶</button>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="1">
      <button class="music-btn" id="mute-btn" title="mute / unmute">♪</button>
    </div>
  </div>

<script>
  // ── Lanyard ──
  const DISCORD_ID = '1483326986570039518';
  async function sync() {
    try {
      const r = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const { data: d } = await r.json();
      document.getElementById('status-dot').className = 'status-dot ' + (d.discord_status ?? '');
    } catch (_) {}
  }
  sync();
  setInterval(sync, 30000);

  // ── Load YouTube IFrame API ──
  (function() {
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    var first = document.getElementsByTagName('script')[0];
    first.parentNode.insertBefore(tag, first);
  })();

  // ── YouTube player ──
  var ytPlayer;
  var ytReady = false;

  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player', {
      videoId: 'MumaIugd_30',
      playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'MumaIugd_30' },
      events: {
        onReady: function(e) {
          e.target.setVolume(1);
          ytReady = true;
          const data = e.target.getVideoData();
          if (data && data.title) {
            document.getElementById('music-title').textContent = data.title;
          }
        },
        onStateChange: function() {
          setTimeout(() => {
            if (!ytPlayer) return;
            const data = ytPlayer.getVideoData();
            if (data && data.title) {
              document.getElementById('music-title').textContent = data.title;
            }
          }, 500);
        }
      }
    });
  }

  // ── Enter overlay ──
  const overlay = document.getElementById('enter-overlay');
  overlay.addEventListener('click', function() {
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 500);
    // start music now that we have user interaction
    if (ytReady) {
      ytPlayer.playVideo();
      document.getElementById('play-btn').textContent = '⏸';
    } else {
      // player not ready yet — play as soon as it is
      var waitPlay = setInterval(() => {
        if (ytReady) {
          ytPlayer.playVideo();
          document.getElementById('play-btn').textContent = '⏸';
          clearInterval(waitPlay);
        }
      }, 100);
    }
  });

  // ── Player controls ──
  document.getElementById('play-btn').addEventListener('click', function() {
    if (!ytPlayer || !ytReady) return;
    if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
      ytPlayer.pauseVideo();
      this.textContent = '▶';
    } else {
      ytPlayer.playVideo();
      this.textContent = '⏸';
    }
  });

  document.getElementById('mute-btn').addEventListener('click', function() {
    if (!ytPlayer) return;
    if (ytPlayer.isMuted()) {
      ytPlayer.unMute();
      this.textContent = '♪';
    } else {
      ytPlayer.mute();
      this.textContent = '✕';
    }
  });

  document.getElementById('vol-slider').addEventListener('input', function() {
    if (!ytPlayer) return;
    const v = parseInt(this.value);
    ytPlayer.setVolume(v);
    const btn = document.getElementById('mute-btn');
    if (v === 0) { ytPlayer.mute();   btn.textContent = '✕'; }
    else         { ytPlayer.unMute(); btn.textContent = '♪'; }
  });

  // ── Snow ──
  const canvas = document.getElementById('snow');
  const ctx = canvas.getContext('2d');
  let W, H, flakes;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeFlake() {
    return {
      x: Math.random() * W, y: Math.random() * H - H,
      r: Math.random() * 1.6 + 0.4,
      speed: Math.random() * 0.6 + 0.2,
      drift: Math.random() * 0.4 - 0.2,
      opacity: Math.random() * 0.5 + 0.2
    };
  }

  function init() { resize(); flakes = Array.from({ length: 120 }, makeFlake); }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const f of flakes) {
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${f.opacity})`;
      ctx.fill();
      f.y += f.speed; f.x += f.drift;
      if (f.y > H + 4) { f.y = -4; f.x = Math.random() * W; }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
</script>
