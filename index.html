<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tabby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f11;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 340px;
      background: linear-gradient(160deg, #1f1f1f 0%, #1a1a1a 100%);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #222;
      background: rgba(0,0,0,0.15);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(136,120,212,0.1);
    }

    .profile-right {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .username { font-size: 0.7rem; font-weight: 400; white-space: nowrap; }
    .u-bracket { color: #484848; }
    .u-name    { color: #a8b0cc; }
    .u-at      { color: #484848; }
    .u-host    { color: #8878d4; }
    .u-path    { color: #484848; }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2e2e2e;
      flex-shrink: 0;
      margin-left: 8px;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-dot.online { background: #3ba55d; box-shadow: 0 0 5px rgba(59,165,93,0.5); }
    .status-dot.idle   { background: #faa61a; box-shadow: 0 0 5px rgba(250,166,26,0.4); }
    .status-dot.dnd    { background: #ed4245; box-shadow: 0 0 5px rgba(237,66,69,0.4); }

    .section {
      padding: 11px 16px;
      border-bottom: 1px solid #202020;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.58rem;
      color: #3a3a3a;
      text-transform: lowercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .about-text {
      font-size: 0.66rem;
      font-weight: 300;
      color: #6e6e6e;
      line-height: 1.65;
      letter-spacing: 0.01em;
      padding-left: 2px;
    }

    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      margin-top: 3px;
      border-radius: 2px;
      border-left: 2px solid transparent;
      text-decoration: none;
      color: #707070;
      font-size: 0.68rem;
      font-weight: 300;
      transition: all 0.12s ease;
      cursor: pointer;
    }
    .link-row:first-child { margin-top: 0; }

    .link-row:hover {
      background: rgba(136,120,212,0.07);
      border-left-color: #8878d4;
      color: #c0c0c0;
      padding-left: 10px;
    }

    .link-row:hover .link-arrow { opacity: 1; color: #8878d4; }

    .link-arrow {
      font-size: 0.65rem;
      opacity: 0;
      transition: opacity 0.12s, color 0.12s;
    }

    .footer {
      padding: 7px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.15);
    }

    .footer-left  { font-size: 0.58rem; color: #2e2e2e; letter-spacing: 0.04em; }
    .footer-right { font-size: 0.58rem; color: #8878d4; opacity: 0.35; letter-spacing: 0.04em; }
  </style>
</head>
<body>

<canvas id="snow" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.55;"></canvas>

<div class="card">
  <div class="profile">
    <img class="avatar" src="YOUR_BASE64_IMAGE_HERE" alt="avatar" />
    <div class="profile-right">
      <span class="username">
        <span class="u-bracket">
